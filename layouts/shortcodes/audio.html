{{ $path := .Get 0 }}
{{ $src := $path }}
{{ with .Page.Resources.GetMatch $path }}
{{ $src = .RelPermalink }}
{{ end }}
<div class="audio-container media-container">
  <audio controls preload="metadata" class="audio-player media">
    <source src="{{ $src | safeHTML -}}" type="audio/mpeg" />
  </audio>
</div>
